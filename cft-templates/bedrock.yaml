AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CloudFormation template to create a Bedrock Execution Role
  with a dummy parameter and a no-op resource for stack completion.
 
Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Environment name (e.g., dev, qa, prod)
 
Resources:
  # Dummy Resource (no functional purpose, just to ensure a complete stack)
  DummyResource:
    Type: AWS::CloudFormation::WaitConditionHandle
 
  # Bedrock Execution Role
  BedrockExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Policies:
        - PolicyName: BedrockExecutionRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "bedrock:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "s3vectors:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iam:CreateRole"
                  - "iam:AttachRolePolicy"
                  - "iam:PutRolePolicy"
                  - "lambda:ListFunctions"
                  - "lambda:GetFunction"
                  - "lambda:InvokeFunction"
                  - "iam:CreateRole"
                  - "iam:GetRole"
                  - "iam:PassRole"
                  - "iam:ListAttachedRolePolicies"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "aoss:CreateCollection"
                  - "aoss:ListCollections"
                  - "aoss:BatchGetCollection"
                  - "aoss:DeleteCollection"
                  - "aoss:CreateAccessPolicy"
                  - "aoss:GetAccessPolicy"
                  - "aoss:ListAccessPolicies"
                  - "aoss:UpdateAccessPolicy"
                  - "aoss:DeleteAccessPolicy"
                  - "aoss:CreateSecurityPolicy"
                  - "aoss:GetSecurityPolicy"
                  - "aoss:ListSecurityPolicies"
                  - "aoss:UpdateSecurityPolicy"
                  - "aoss:DeleteSecurityPolicy"
                Resource: "*"
 
Outputs:
  BedrockExecutionRoleArn:
    Description: ARN of the created Bedrock Execution Role
    Value: !GetAtt BedrockExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BedrockExecutionRoleArn"
 
