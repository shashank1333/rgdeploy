AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Create SageMaker Studio UserProfile and automatically provision a JupyterLab Space + App using a Lambda-backed Custom Resource.
Parameters:
  DomainId:
    Type: String
    Description: Pre-existing SageMaker Studio Domain ID

  UserProfileName:
    Type: String
    Description: SageMaker Studio User Profile Name

  InstanceType:
    Type: String
    Description: Instance type for JupyterLab app
    Default: ml.t3.medium
    AllowedValues:
      - ml.t3.medium
      - ml.t3.large
      - ml.t3.xlarge
      - ml.t3.2xlarge

  SpaceName:
    Type: String
    Description: Space name for JupyterLab
  
  ResearcherName:
    Type: String
    Default: abc@example.com
    Description: Name of the Researcher (will be added as tag)


Resources:

  ##############################
  # SageMaker Execution Role
  ##############################
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-sagemaker-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
      Policies:
        - PolicyName: SageMakerExecutionRolePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "sagemaker:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "bedrock:*"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "s3:GetObject"
                  - "s3:PutObject"
                  - "s3:DeleteObject"
                  - "s3:ListBucket"
                  - "s3:GetBucketLocation"
                  - "s3:ListAllMyBuckets"
                  - "s3:GetBucketCors"
                  - "s3:GetBucketVersioning"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "ec2:CreateNetworkInterface"
                  - "ec2:CreateNetworkInterfacePermission"
                  - "ec2:DeleteNetworkInterface"
                  - "ec2:DeleteNetworkInterfacePermission"
                  - "ec2:DescribeNetworkInterfaces"
                  - "ec2:DescribeVpcs"
                  - "ec2:DescribeSubnets"
                  - "ec2:DescribeSecurityGroups"
                  - "ec2:DescribeRouteTables"
                  - "ec2:DescribeAvailabilityZones"
                  - "ec2:DescribeDhcpOptions"
                  - "ec2:DescribeVpcEndpoints"
                  - "ec2:CreateTags"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "elasticfilesystem:DescribeFileSystems"
                  - "elasticfilesystem:DescribeMountTargets"
                  - "elasticfilesystem:CreateAccessPoint"
                  - "elasticfilesystem:DescribeAccessPoints"
                  - "elasticfilesystem:DeleteAccessPoint"
                  - "elasticfilesystem:ClientMount"
                  - "elasticfilesystem:ClientWrite"
                  - "elasticfilesystem:ClientRootAccess"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "ec2:CreateVolume"
                  - "ec2:DeleteVolume"
                  - "ec2:DescribeVolumes"
                  - "ec2:AttachVolume"
                  - "ec2:DetachVolume"
                  - "ec2:ModifyVolume"
                  - "ec2:CreateSnapshot"
                  - "ec2:DeleteSnapshot"
                  - "ec2:DescribeSnapshots"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                  - "logs:DescribeLogGroups"
                  - "logs:DescribeLogStreams"
                  - "logs:GetLogEvents"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "cloudwatch:PutMetricData"
                  - "cloudwatch:GetMetricData"
                  - "cloudwatch:GetMetricStatistics"
                  - "cloudwatch:ListMetrics"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "ecr:GetAuthorizationToken"
                  - "ecr:BatchCheckLayerAvailability"
                  - "ecr:GetDownloadUrlForLayer"
                  - "ecr:BatchGetImage"
                Resource: "*"
              - Effect: Allow
                Action:
                  - "iam:GetRole"
                  - "iam:PassRole"
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMaker-ExecutionRole-*"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/${AWS::StackName}-sagemaker-execution-role"

  ##############################
  # Lambda execution role
  ##############################
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${UserProfileName}-lambda-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SageMakerJupyterLabFullAccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Core SageMaker Space and App Operations
              - Effect: Allow
                Action:
                  - sagemaker:CreateSpace
                  - sagemaker:DeleteSpace
                  - sagemaker:DescribeSpace
                  - sagemaker:ListSpaces
                  - sagemaker:UpdateSpace
                  - sagemaker:CreateApp
                  - sagemaker:DeleteApp
                  - sagemaker:DescribeApp
                  - sagemaker:ListApps
                  - sagemaker:CreatePresignedDomainUrl
                  - sagemaker:StartSession
                Resource: "*"

              # Domain & UserProfile ops
              - Effect: Allow
                Action:
                  - sagemaker:DescribeDomain
                  - sagemaker:ListDomains
                  - sagemaker:DescribeUserProfile
                  - sagemaker:ListUserProfiles
                  - sagemaker:UpdateUserProfile
                Resource: "*"

              # Image operations
              - Effect: Allow
                Action:
                  - sagemaker:DescribeImage
                  - sagemaker:DescribeImageVersion
                  - sagemaker:ListImages
                  - sagemaker:ListImageVersions
                Resource: "*"

              # Tagging
              - Effect: Allow
                Action:
                  - sagemaker:AddTags
                  - sagemaker:ListTags
                  - sagemaker:DeleteTags
                Resource: "*"

              # IAM PassRole (must be allowed for the SageMaker exec role)
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt SageMakerExecutionRole.Arn
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/service-role/AmazonSageMaker-ExecutionRole-*"

              # EC2 operations (networking / compute)
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:CreateNetworkInterfacePermission
                  - ec2:DeleteNetworkInterface
                  - ec2:DeleteNetworkInterfacePermission
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeRouteTables
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeVpcEndpoints
                  - ec2:CreateTags
                Resource: "*"

              # EFS
              - Effect: Allow
                Action:
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:CreateAccessPoint
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DeleteAccessPoint
                Resource: "*"

              # EBS (volume ops)
              - Effect: Allow
                Action:
                  - ec2:CreateVolume
                  - ec2:DeleteVolume
                  - ec2:DescribeVolumes
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                  - ec2:ModifyVolume
                  - ec2:CreateSnapshot
                  - ec2:DeleteSnapshot
                  - ec2:DescribeSnapshots
                Resource: "*"

              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"

              # S3
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:ListAllMyBuckets
                Resource: "*"

  ##############################
  # SageMaker UserProfile
  ##############################
  SageMakerUserProfile:
    Type: AWS::SageMaker::UserProfile
    Properties:
      DomainId: !Ref DomainId
      UserProfileName: !Ref UserProfileName
      UserSettings:
        ExecutionRole: !GetAtt SageMakerExecutionRole.Arn
      Tags:
        - Key: cost_resource
          Value: !Sub '${AWS::StackName}'
        - Key: ResearcherName
          Value: !Ref ResearcherName

  ##############################
  # Lambda function to manage Space/App (idempotent)
  ##############################
  SageMakerSpaceAppLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${UserProfileName}-spaceapp-lambda"
      Handler: index.lambda_handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 900
      MemorySize: 256
      Code:
        ZipFile: |
          import boto3
          import time
          import json
          import cfnresponse
          from botocore.exceptions import ClientError

          def wait_for_status(describe_fn, status_key, desired, max_wait=600, poll_interval=10, **kwargs):
              """Generic waiter for any SageMaker resource status"""
              start = time.time()
              while time.time() - start < max_wait:
                  try:
                      resp = describe_fn(**kwargs)
                      status = resp[status_key]
                      print(f"Current {status_key}: {status}")
                      if status == desired:
                          return True
                      if status == "Failed":
                          raise Exception(f"Resource failed with status 'Failed'")
                  except ClientError as e:
                      print(f"Error while waiting: {e}")
                  time.sleep(poll_interval)
              raise Exception(f"Timeout waiting for {status_key}={desired}")

          def lambda_handler(event, context):
              print("Event:", json.dumps(event))
              sm = boto3.client("sagemaker")

              try:
                  props = event["ResourceProperties"]
                  domain_id = props["DomainId"]
                  user_profile = props["UserProfileName"]
                  space_name = props.get("SpaceName") or f"{user_profile}-lab-space"
                  instance_type = props.get("InstanceType", "ml.t3.medium")
                  region = props.get("Region") or boto3.session.Session().region_name
                  researcher_name = props.get("ResearcherName", "UnknownResearcher")
                  cost_resource = props.get("CostResource", f"{domain_id}-{user_profile}")


                  # Define common tags to apply to all resources
                  common_tags = [
                      {"Key": "cost_resource", "Value": cost_resource},
                      {"Key": "ResearcherName", "Value": researcher_name}
                  ]

                  request_type = event["RequestType"]

                  if request_type in ("Create", "Update"):
                      # --- Create Space ---
                      try:
                          sm.describe_space(DomainId=domain_id, SpaceName=space_name)
                          print(f"Space {space_name} already exists")
                      except ClientError as e:
                          if e.response["Error"]["Code"] == "ResourceNotFound":
                              print(f"Creating space {space_name} with tags")
                              sm.create_space(
                                  DomainId=domain_id,
                                  SpaceName=space_name,
                                  OwnershipSettings={"OwnerUserProfileName": user_profile},
                                  SpaceSharingSettings={"SharingType": "Private"},
                                  SpaceSettings={"AppType": "JupyterLab"},
                                  Tags=common_tags
                              )
                          else:
                              raise

                      wait_for_status(
                          sm.describe_space, "Status", "InService",
                          DomainId=domain_id, SpaceName=space_name
                      )

                      # --- Create App ---
                      print(f"Creating JupyterLab app 'default' with tags")
                      sm.create_app(
                          DomainId=domain_id,
                          SpaceName=space_name,
                          AppType="JupyterLab",
                          AppName="default",
                          ResourceSpec={
                              "InstanceType": instance_type,
                              "SageMakerImageArn": "arn:aws:sagemaker:us-east-1:081325390199:image/sagemaker-distribution-cpu"
                          },
                          Tags=[
                              *common_tags,
                              {"Key": "InstanceType", "Value": instance_type}
                          ]
                      )

                      wait_for_status(
                          sm.describe_app, "Status", "InService",
                          DomainId=domain_id, SpaceName=space_name,
                          AppType="JupyterLab", AppName="default"
                      )

                      response_data = {
                          "DomainId": domain_id,
                          "UserProfileName": user_profile,
                          "SpaceName": space_name
                      }
                      physical_id = f"{domain_id}-{space_name}"
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data, physicalResourceId=physical_id)

                  elif request_type == "Delete":
                      # --- Delete App ---
                      try:
                          sm.delete_app(
                              DomainId=domain_id,
                              SpaceName=space_name,
                              AppType="JupyterLab",
                              AppName="default"
                          )
                          print("App delete requested")
                      except Exception as e:
                          print("Delete app error:", e)
                      
                      wait_for_status(
                          sm.describe_app, "Status", "Deleted",
                          DomainId=domain_id, SpaceName=space_name,
                          AppType="JupyterLab", AppName="default"
                      )

                      # --- Delete Space ---
                      try:
                          sm.delete_space(DomainId=domain_id, SpaceName=space_name)
                          print("Space delete requested")
                      except Exception as e:
                          print("Delete space error:", e)

                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {},
                          physicalResourceId=f"{domain_id}-{space_name}")

                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {},
                          physicalResourceId="noop")

              except Exception as e:
                  print("Error:", str(e))
                  cfnresponse.send(event, context, cfnresponse.FAILED,
                      {"Error": str(e)}, physicalResourceId="failed")

  ##############################
  # Custom Resource
  ##############################
  SageMakerSpaceAppCustom:
    Type: Custom::SageMakerSpaceApp
    DependsOn: SageMakerUserProfile
    Properties:
      ServiceToken: !GetAtt SageMakerSpaceAppLambda.Arn
      DomainId: !Ref DomainId
      UserProfileName: !Ref UserProfileName
      SpaceName: !Ref SpaceName
      InstanceType: !Ref InstanceType
      Region: !Ref AWS::Region
      CostResource: !Sub '${AWS::StackName}'
      ResearcherName: !Ref ResearcherName


Outputs:
  StackName:
    Description: Name of the Stack for User Profile
    Value: !Sub '${AWS::StackName}'

  UserProfileName:
    Description: Name of the SageMaker Studio User Profile
    Value: !Ref UserProfileName

  ExecutionRoleArn:
    Description: ARN of the execution role for the UserProfile
    Value: !GetAtt SageMakerExecutionRole.Arn

  SpaceName:
    Description: Name of the created JupyterLab Space (from custom resource)
    Value: !GetAtt SageMakerSpaceAppCustom.SpaceName

  DomainId:
    Description: Domain ID used for the UserProfile
    Value: !GetAtt SageMakerSpaceAppCustom.DomainId

  InstanceType:
    Description: Instance type for JupyterLab app for the UserProfile
    Value: !Ref InstanceType
  